name: Deploy Production

on:
  workflow_dispatch:
    inputs:
      commit_sha:
        description: "Main branch commit SHA to deploy"
        required: true
        type: string

permissions:
  contents: read
  deployments: write

jobs:
  production:
    name: Production Deployment Gate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production
    if: github.ref == 'refs/heads/main'
    env:
      APP_ENV: production
      NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
      WORKER_BASE_URL: ${{ secrets.WORKER_BASE_URL }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      REDIS_URL: ${{ secrets.REDIS_URL }}
      OBJECT_STORAGE_ENDPOINT: ${{ secrets.OBJECT_STORAGE_ENDPOINT }}
      OBJECT_STORAGE_REGION: ${{ secrets.OBJECT_STORAGE_REGION }}
      OBJECT_STORAGE_BUCKET: ${{ secrets.OBJECT_STORAGE_BUCKET }}
      OBJECT_STORAGE_ACCESS_KEY_ID: ${{ secrets.OBJECT_STORAGE_ACCESS_KEY_ID }}
      OBJECT_STORAGE_SECRET_ACCESS_KEY: ${{ secrets.OBJECT_STORAGE_SECRET_ACCESS_KEY }}
      OBJECT_STORAGE_PUBLIC_BASE_URL: ${{ secrets.OBJECT_STORAGE_PUBLIC_BASE_URL }}
      AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
      AUTH_GITHUB_ID: ${{ secrets.AUTH_GITHUB_ID }}
      AUTH_GITHUB_SECRET: ${{ secrets.AUTH_GITHUB_SECRET }}
      STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
      STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
      STRIPE_PRICE_PRO_MONTHLY: ${{ secrets.STRIPE_PRICE_PRO_MONTHLY }}
      STRIPE_PRICE_TEAM_MONTHLY: ${{ secrets.STRIPE_PRICE_TEAM_MONTHLY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_MODEL_EXTRACTION: ${{ vars.OPENAI_MODEL_EXTRACTION }}
      OPENAI_MODEL_GENERATION: ${{ vars.OPENAI_MODEL_GENERATION }}
      GITHUB_APP_ID: ${{ secrets.GITHUB_APP_ID }}
      GITHUB_APP_PRIVATE_KEY: ${{ secrets.GITHUB_APP_PRIVATE_KEY }}
      GITHUB_APP_WEBHOOK_SECRET: ${{ secrets.GITHUB_APP_WEBHOOK_SECRET }}
      GITHUB_APP_CLIENT_ID: ${{ secrets.GITHUB_APP_CLIENT_ID }}
      GITHUB_APP_CLIENT_SECRET: ${{ secrets.GITHUB_APP_CLIENT_SECRET }}
      ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate requested commit
        run: |
          if [ "${{ inputs.commit_sha }}" != "${GITHUB_SHA}" ]; then
            echo "Production deploy must be run from the checked main commit."
            exit 1
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify production candidate
        run: |
          npm run typecheck
          npm run lint
          npm run test:unit
          npm run test:integration
          npm run test:e2e
          npm run test:ai-eval
          npm run coverage:critical
          npm run prisma:validate
          npm run secret:scan
          npm run audit:ci
          npm run build

      - name: Run migrations
        run: npm run deploy:migrate

      - name: Check production health
        run: npm run deploy:health -- --check-config

      - name: Check worker entrypoint
        run: npm run worker:health

      - name: Production deployment provider command
        run: echo "Run web and worker deployment provider commands for production here."
