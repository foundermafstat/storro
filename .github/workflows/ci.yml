name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    name: Quality Gates
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test:unit

      - name: Integration tests
        run: npm run test:integration

      - name: E2E tests
        run: npm run test:e2e

      - name: AI evaluation tests
        run: npm run test:ai-eval

      - name: Critical coverage report
        run: npm run coverage:critical

      - name: Prisma validation
        run: npm run prisma:validate

      - name: Secret scan
        run: npm run secret:scan

      - name: Dependency audit
        run: npm run audit:ci

      - name: Build
        run: npm run build

      - name: Write CI summary artifact
        if: always()
        run: |
          mkdir -p artifacts
          {
            echo "workflow=ci"
            echo "commit=${GITHUB_SHA}"
            echo "job=${GITHUB_JOB}"
            echo "completed_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          } > artifacts/ci-summary.txt

      - name: Upload CI artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-summary
          path: artifacts/
