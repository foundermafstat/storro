name: Deploy Preview

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  deployments: write

jobs:
  preview:
    name: Preview Deployment Gate
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build preview artifact
        run: npm run build

      - name: Preview deployment placeholder
        run: echo "Preview deployment provider wiring belongs here."
