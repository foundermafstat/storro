services:
  postgres:
    image: postgres:16-alpine
    container_name: storro-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: storro
      POSTGRES_USER: storro
      POSTGRES_PASSWORD: ${STORRO_POSTGRES_PASSWORD:?STORRO_POSTGRES_PASSWORD is required}
    ports:
      - "127.0.0.1:55433:5432"
    volumes:
      - storro-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U storro -d storro"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: storro-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "127.0.0.1:56379:6379"
    volumes:
      - storro-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  storro-postgres-data:
  storro-redis-data:
